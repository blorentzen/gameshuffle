<!doctype html>
<html lang="en">

    <head>
        <title>Mario Kart 8 Deluxe Kart and Track Randomizer for Stream</title>

        <!-- Regular META -->
        <meta name="author" content="Britton Lorentzen" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
        <meta charset="UTF-8">
        <meta NAME="robots" CONTENT="index, follow" />
        <meta name="description"
            content="Add and remove players joining the game, randomize all your karts or one at a time, and also randomize your track selections all in one place." />
        <meta name="keywords" content="" />
        <meta name="theme-color" content="#000000">

        <!-- OpenGraph META -->
        <meta property="og:locale" content="en_US" />
        <meta property="og:site_name" content="GameShuffle" />
        <meta property="og:title" content="Mario Kart 8 Deluxe Kart and Track Randomizer" />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="https://gameshuffle.co/files/images/opengraph/gs-mk8dx-og.jpg" />
        <meta property="og:description"
            content="Add and remove players joining the game, randomize all your karts or one at a time, and also randomize your track selections all in one place." />
        <meta property="og:url" content="https://gameshuffle.co/" />

        <!-- Twitter Card Markup 
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:site" content="@" />
		<meta name="twitter:creator" content="@" />
		-->

        <!-- Stylesheets and Javascript -->
        <link rel="shortcut icon" href="/files/images/browser/gameshuffle-browser-icon.png">
        <link rel="stylesheet" type="text/css" href="/files/css/styles.css" />
        <script type="module" src="/files/empacjs/app.js"></script>
        <script type="text/javascript" src="/files/empacjs/functions.js"></script>
        <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

        <!-- Analytics -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-WBXS3D8GBL"></script>
        <script src="https://gameshuffle.co/files/empacjs/analytics.js"></script>
        <script defer data-domain="gameshuffle.co"
            src="https://plausible.io/js/script.tagged-events.outbound-links.js"></script>

        <!-- Set Canonical -->
        <link rel="canonical" href="https://gameshuffle.co/" />

    </head>

    <body class="stream">

        <!-- Loader for page loads -->
        <ejs-loader style="display: none;"></ejs-loader>

        <!-- Navigation Section -->
        <div class="nav-container">
            <nav>
                <button class="randomizer-start"><img class="logo" alt="game shuffle"
                        src="/files/images/fg/logos/gs-color-mono.png" /></a>
            </nav>

            <div class="btn-group" ejs-type="randomizer-toggle">
                <button ejs-toggle="kart-randomizer" class="primary btn active">Kart Randomizer</button>
                <button ejs-toggle="race-randomizer" class="primary btn">Race Randomizer</button>
                <button ejs-toggle="tourney-mode" class="primary btn">Tourney Mode</button>
            </div>
        </div>

        <!-- Main Content -->
        <main ejs-rz="mk8dx">

            <section class="kart-randomizer">

                <div class="kart-subnav">

                    <div class="filter-group">

                        <div class="filter-section">

                            <span><b>Character Weights</b></span>

                            <div ejs-for="char-filtering" class="filters">
                                <button ejs-filter="Light">Light</button>
                                <button ejs-filter="Medium">Medium</button>
                                <button ejs-filter="Heavy">Heavy</button>
                            </div>

                        </div>

                        <div class="filter-section">
                            <span><b>Drift Type</b></span>

                            <div ejs-for="vehi-filtering" class="filters">
                                <button ejs-filter="Inward">Inward Drift</button>
                                <button ejs-filter="Outward">Outward Drift</button>
                            </div>
                        </div>

                    </div>

                    <div class="btn-group">
                        <button ejs-for="add-player" class="primary btn brand">Add Player</button>
                        <button ejs-for="randomize-karts" class="primary btn brand">Randomize Karts</button>
                    </div>

                </div>

                <div class="randomizer-section">

                    <div ejs-index="1" ejs-type="randomizer">

                        <div class="player-section">
                            <div class="username">
                                <input type="text" placeholder="Player Name">
                            </div>

                            <div class="btn-group">
                                <button class="refresh">Refresh Kart</button>
                                <button class="close">Remove Player</button>
                            </div>

                        </div>

                        <ul>
                            <li ejs-subtype="characters">
                                <img />
                                <span>???</span>
                            </li>
                            <li ejs-subtype="vehicles">
                                <img />
                                <span>???</span>
                            </li>
                            <li ejs-subtype="wheels">
                                <img />
                                <span>???</span>
                            </li>
                            <li ejs-subtype="gliders">
                                <img />
                                <span>???</span>
                            </li>
                        </ul>
                    </div>

                </div>

            </section>

            <section class="race-randomizer" style="display: none;">

                <div class="race-subnav">

                    <div class="filter-group">

                        <div class="filter-section">

                            <span><b>Race Modifiers</b></span>

                            <div ejs-for="track-filtering" class="filters">
                                <button ejs-filter="no-dups">No Duplicates</button>
                                <button ejs-filter="all-tour">All Tour Tracks</button>
                            </div>

                        </div>

                        <div class="race-number-section">

                            <span><b>Amount of Races</b></span>

                            <div class="race-group">
                                <button ejs-type="minus">-</button>
                                <input name="track-amount" type="number" min="1" max="48" value="4">
                                <button ejs-type="plus">+</button>
                            </div>
                        </div>

                    </div>

                    <div class="btn-group">
                        <button ejs-for="randomize-races" class="primary btn brand">Randomize Races</button>
                    </div>

                </div>

                <div class="track-randomizer-section">

                    <div ejs-type="track-randomizer">
                        <ul></ul>
                    </div>

                </div>

            </section>

            <section class="tourney-mode" style="display: none;">

                <div class="race-subnav">

                    <div class="filter-group">

                        <div class="race-number-section">

                            <span><b>Amount of Races</b></span>

                            <div ejs-for="generate-races" class="race-group">
                                <button ejs-type="minus">-</button>
                                <input name="track-amount" type="number" min="1" max="48" value="4">
                                <button ejs-type="plus">+</button>
                            </div>
                        </div>

                    </div>

                </div>

                <div class="tourney-mode-section">

                    <div ejs-type="tourney-mode-races">
                        <ul></ul>
                    </div>

                </div>

            </section>

        </main>

    </body>

</html>
